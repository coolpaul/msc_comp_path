name: msc_comp_path
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.12      # Python 3.12
  
  # Core Data Science & Math
  - numpy            # Numerical computing
  - scipy            # Advanced scientific stats
  - pandas           # Dataframes
  - scikit-learn     # Model evaluation (Confusion matrices, ML, etc.)
  
  # Visualization
  - matplotlib       # Basic plotting
  - seaborn          # Statistical visualization
  - plotnine         # Grammar of Graphics (ggplot2 style)
  - plotly           # Interactive graphs for Quarto
  
  # Digital Pathology & Image Processing
  - openslide-python # Reads Whole Slide Images (SVS, NDPI, etc.)
  - scikit-image     # Standard image processing algorithms
  - tifffile         # Essential for reading large/complex medical TIFFs
  - imagecodecs      # Required for decoding compressed medical images
  
  # Environment & App Dependencies
  - jupyterlab       # Backend engine for notebooks/Quarto
  - pyqt=5           # Required for labelImg UI
  - lxml             # Required for labelImg XML
  
  # Pip packages 
  - pip
  - pip:
    - ultralytics    # YOLO Engine
    - huggingface_hub # Required for YOLOv10+ architecture
    - opencv-python  # Fast video/webcam frame processing
    - labelImg       # Annotation tool